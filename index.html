<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#128C7E">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <title>WhatsApp</title>
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icon-192.png">

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        html, body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #e5ddd5;
            height: 100%;
            overflow: hidden;
        }

        .app {
            max-width: 500px;
            margin: 0 auto;
            height: 100vh;
            display: flex;
            flex-direction: column;
            background: white;
        }

        .header {
            background: #128C7E;
            color: white;
            padding: 10px 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-shrink: 0;
        }

        .header-left { display: flex; align-items: center; gap: 15px; }
        .header h1 { font-size: 20px; font-weight: 500; }
        .header-icons { display: flex; gap: 20px; }

        .icon-btn {
            background: none;
            border: none;
            color: white;
            font-size: 20px;
            cursor: pointer;
        }

        .tabs {
            background: #128C7E;
            display: flex;
            color: rgba(255,255,255,0.8);
            flex-shrink: 0;
        }

        .tab {
            flex: 1;
            padding: 12px;
            text-align: center;
            cursor: pointer;
            font-size: 14px;
            text-transform: uppercase;
        }

        .tab.active { color: white; border-bottom: 3px solid white; }

        .chat-list {
            flex: 1;
            overflow-y: auto;
            background: white;
        }

        .chat-item {
            display: flex;
            padding: 12px 16px;
            border-bottom: 1px solid #f0f0f0;
            cursor: pointer;
        }

        .chat-item:hover { background: #f5f5f5; }

        .avatar {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: #dfe5e7;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            margin-right: 15px;
        }

        .chat-info { flex: 1; }

        .chat-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 4px;
        }

        .chat-name { font-weight: 600; color: #111; font-size: 16px; }
        .chat-time { color: #999; font-size: 12px; }
        .chat-message { color: #666; font-size: 14px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        .fab {
            position: fixed;
            bottom: 20px;
            right: 20px;
            width: 56px;
            height: 56px;
            border-radius: 50%;
            background: #25D366;
            color: white;
            border: none;
            font-size: 24px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.3);
            cursor: pointer;
            z-index: 50;
        }

        /* Chat Screen - Fixed Layout */
        .chat-screen {
            display: none;
            flex-direction: column;
            height: 100vh;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: #e5ddd5;
            z-index: 100;
        }

        .chat-screen.active { display: flex; }

        .chat-header-bar {
            background: #128C7E;
            color: white;
            padding: 10px 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-shrink: 0;
        }

        .chat-header-left { display: flex; align-items: center; gap: 10px; }

        .back-btn {
            background: none;
            border: none;
            color: white;
            font-size: 24px;
            cursor: pointer;
        }

        .chat-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
        }

        .chat-title { font-size: 16px; font-weight: 500; }
        .chat-status { font-size: 12px; opacity: 0.8; }

        .chat-header-icons { display: flex; gap: 15px; }

        .chat-header-icons .icon-btn { font-size: 18px; }

        /* Messages Area */
        .messages-container {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            background-image: url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" width="100" height="100"><rect fill="%23e5ddd5" width="100" height="100"/><path fill="%23d1d7db" d="M0 0h100v100H0z" opacity="0.4"/></svg>');
        }

        .message {
            max-width: 80%;
            padding: 8px 12px;
            margin-bottom: 8px;
            border-radius: 8px;
            word-wrap: break-word;
            position: relative;
        }

        .message.sent {
            background: #dcf8c6;
            margin-left: auto;
            border-bottom-right-radius: 0;
        }

        .message.received {
            background: white;
            margin-right: auto;
            border-bottom-left-radius: 0;
        }

        .message-sender { font-size: 12px; color: #128C7E; margin-bottom: 2px; }
        .message-text { font-size: 15px; color: #111; }
        .message-time { font-size: 11px; color: #999; text-align: right; margin-top: 4px; }

        .loading, .empty-state {
            text-align: center;
            color: #999;
            padding: 40px 20px;
            font-size: 14px;
        }

        /* Input Area - Fixed at Bottom */
        .input-area {
            background: #f0f0f0;
            padding: 10px 15px;
            display: flex;
            align-items: center;
            gap: 10px;
            flex-shrink: 0;
            border-top: 1px solid #ddd;
            min-height: 60px;
        }

        .emoji-btn {
            background: none;
            border: none;
            font-size: 24px;
            cursor: pointer;
            padding: 5px;
        }

        .message-input {
            flex: 1;
            border: none;
            border-radius: 20px;
            padding: 12px 16px;
            font-size: 16px;
            outline: none;
            background: white;
            min-height: 44px;
        }

        .send-btn {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            background: #128C7E;
            color: white;
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            flex-shrink: 0;
        }

        .send-btn:active { background: #0d6b5e; }

        /* Auth Screen */
        .auth-screen {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            background: white;
            padding: 20px;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            z-index: 200;
        }

        .auth-screen.hidden { display: none; }

        .logo {
            width: 100px;
            height: 100px;
            background: #25D366;
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 60px;
            margin-bottom: 30px;
        }

        .auth-input {
            width: 100%;
            max-width: 300px;
            padding: 15px;
            border: 1px solid #ddd;
            border-radius: 8px;
            margin-bottom: 15px;
            font-size: 16px;
        }

        .auth-btn {
            width: 100%;
            max-width: 300px;
            padding: 15px;
            background: #128C7E;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
        }

        .error-msg { color: #e74c3c; margin-top: 10px; font-size: 14px; }
    </style>
</head>
<body>
    <!-- Auth Screen -->
    <div class="auth-screen" id="authScreen">
        <div class="logo">💬</div>
        <h2 style="margin-bottom: 30px; color: #128C7E;">WhatsApp Clone</h2>
        <input type="text" class="auth-input" id="usernameInput" placeholder="Введите ваше имя" maxlength="20">
        <button class="auth-btn" onclick="enterApp()">Войти</button>
        <div id="authError" class="error-msg"></div>
    </div>

    <!-- Main App -->
    <div class="app" id="mainApp" style="display: none;">
        <div class="header">
            <div class="header-left">
                <h1>WhatsApp</h1>
            </div>
            <div class="header-icons">
                <button class="icon-btn">🔍</button>
                <button class="icon-btn">⋮</button>
            </div>
        </div>

        <div class="tabs">
            <div class="tab">Звонки</div>
            <div class="tab active">Чаты</div>
            <div class="tab">Статус</div>
        </div>

        <div class="chat-list" id="chatList"></div>

        <button class="fab" onclick="startNewChat()">💬</button>
    </div>

    <!-- Chat Screen -->
    <div class="chat-screen" id="chatScreen">
        <div class="chat-header-bar">
            <div class="chat-header-left">
                <button class="back-btn" onclick="closeChat()">←</button>
                <div class="chat-avatar" id="chatAvatar">👤</div>
                <div>
                    <div class="chat-title" id="chatName">Имя</div>
                    <div class="chat-status">в сети</div>
                </div>
            </div>
            <div class="chat-header-icons">
                <button class="icon-btn">📹</button>
                <button class="icon-btn">📞</button>
                <button class="icon-btn">⋮</button>
            </div>
        </div>

        <div class="messages-container" id="messagesContainer">
            <div class="empty-state">Загрузка сообщений...</div>
        </div>

        <div class="input-area">
            <button class="emoji-btn">😊</button>
            <input type="text" class="message-input" id="messageInput" placeholder="Сообщение" onkeypress="handleKeyPress(event)">
            <button class="send-btn" onclick="sendMessage()">➤</button>
        </div>
    </div>

    <!-- Firebase SDK -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { 
            getFirestore, 
            collection, 
            addDoc, 
            query, 
            orderBy, 
            onSnapshot, 
            serverTimestamp
        } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBppttXdUhZ-BVV3XRyhaPMyWW_Lch2Jes",
            authDomain: "dddd-8e287.firebaseapp.com",
            projectId: "dddd-8e287",
            storageBucket: "dddd-8e287.firebasestorage.app",
            messagingSenderId: "678020145717",
            appId: "1:678020145717:web:19bf8867df347a22cc477c"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        window.db = db;
        window.currentUser = localStorage.getItem('whatsapp_username') || '';
        window.currentChat = null;
        let unsubscribeMessages = null;

        window.enterApp = function() {
            const username = document.getElementById('usernameInput').value.trim();
            if (!username) {
                document.getElementById('authError').textContent = 'Введите имя!';
                return;
            }

            localStorage.setItem('whatsapp_username', username);
            window.currentUser = username;
            document.getElementById('authScreen').classList.add('hidden');
            document.getElementById('mainApp').style.display = 'flex';
            loadChats();
        };

        window.loadChats = function() {
            const chatList = document.getElementById('chatList');

            const chats = [
                { id: 'support', name: 'Поддержка', avatar: '🎧', lastMsg: 'Чем помочь?', time: '14:10', unread: 1 },
                { id: 'general', name: 'Общий чат', avatar: '🌐', lastMsg: 'Привет всем!', time: '12:30', unread: 3 },
                { id: 'news', name: 'Новости', avatar: '📰', lastMsg: 'Новое обновление', time: 'Вчера', unread: 0 }
            ];

            chatList.innerHTML = chats.map(chat => `
                <div class="chat-item" onclick="openChat('${chat.id}', '${chat.name}', '${chat.avatar}')">
                    <div class="avatar">${chat.avatar}</div>
                    <div class="chat-info">
                        <div class="chat-header">
                            <span class="chat-name">${chat.name}</span>
                            <span class="chat-time">${chat.time}</span>
                        </div>
                        <div class="chat-message ${chat.unread ? 'unread' : ''}">
                            ${chat.unread ? '<b>●</b> ' : ''}${chat.lastMsg}
                        </div>
                    </div>
                </div>
            `).join('');
        };

        window.openChat = function(chatId, name, avatar) {
            window.currentChat = chatId;
            document.getElementById('chatName').textContent = name;
            document.getElementById('chatAvatar').textContent = avatar;
            document.getElementById('chatScreen').classList.add('active');
            document.getElementById('messagesContainer').innerHTML = '<div class="loading">Загрузка...</div>';

            if (unsubscribeMessages) {
                unsubscribeMessages();
            }

            try {
                const messagesRef = collection(db, 'chats', chatId, 'messages');
                const q = query(messagesRef, orderBy('timestamp', 'asc'));

                unsubscribeMessages = onSnapshot(q, (snapshot) => {
                    const container = document.getElementById('messagesContainer');

                    if (snapshot.empty) {
                        container.innerHTML = '<div class="empty-state">Нет сообщений. Напишите первое!</div>';
                        return;
                    }

                    container.innerHTML = '';

                    snapshot.forEach((doc) => {
                        const msg = doc.data();
                        const isSent = msg.sender === window.currentUser;

                        let timeStr = '';
                        if (msg.timestamp && msg.timestamp.toDate) {
                            const date = msg.timestamp.toDate();
                            timeStr = date.toLocaleTimeString('ru-RU', {hour: '2-digit', minute:'2-digit'});
                        }

                        const msgDiv = document.createElement('div');
                        msgDiv.className = `message ${isSent ? 'sent' : 'received'}`;
                        msgDiv.innerHTML = `
                            ${!isSent ? `<div class="message-sender">${escapeHtml(msg.sender)}</div>` : ''}
                            <div class="message-text">${escapeHtml(msg.text)}</div>
                            <div class="message-time">${timeStr} ${isSent ? '✓✓' : ''}</div>
                        `;
                        container.appendChild(msgDiv);
                    });

                    container.scrollTop = container.scrollHeight;
                }, (error) => {
                    console.error('Error:', error);
                    document.getElementById('messagesContainer').innerHTML = 
                        `<div class="empty-state">Ошибка загрузки: ${error.message}</div>`;
                });

            } catch (error) {
                console.error('Error:', error);
            }
        };

        window.closeChat = function() {
            document.getElementById('chatScreen').classList.remove('active');
            window.currentChat = null;
            if (unsubscribeMessages) {
                unsubscribeMessages();
                unsubscribeMessages = null;
            }
        };

        window.sendMessage = async function() {
            const input = document.getElementById('messageInput');
            const text = input.value.trim();

            if (!text || !window.currentChat) return;
            if (!window.currentUser) {
                alert('Ошибка: не авторизован');
                return;
            }

            try {
                const messagesRef = collection(db, 'chats', window.currentChat, 'messages');

                await addDoc(messagesRef, {
                    sender: window.currentUser,
                    text: text,
                    timestamp: serverTimestamp()
                });

                input.value = '';

            } catch (error) {
                console.error('Error sending:', error);
                alert('Ошибка отправки: ' + error.message);
            }
        };

        window.handleKeyPress = function(e) {
            if (e.key === 'Enter') sendMessage();
        };

        window.startNewChat = function() {
            const name = prompt('Введите имя чата:');
            if (name) {
                const id = 'chat_' + Date.now();
                openChat(id, name, '👤');
            }
        };

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        if (window.currentUser) {
            document.getElementById('authScreen').classList.add('hidden');
            document.getElementById('mainApp').style.display = 'flex';
            loadChats();
        }
    </script>

    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js')
                .then(reg => console.log('SW registered'))
                .catch(err => console.log('SW error', err));
        }
    </script>
</body>
</html>
